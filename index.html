<style>
  :root {
    --primary: #1d4ed8;
    --primary-dark: #173ea6;
    --primary-soft: #dbeafe;
    --accent: #10b981;
    --accent-soft: #d1fae5;
    --ink: #111827;
    --muted: #4b5563;
    --border: #e5e7eb;
    --bg-soft: #f8fafc;
    --bg-card: #ffffff;
    --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    --shadow-soft: 0 6px 18px rgba(15, 23, 42, 0.06);
    --radius: 18px;
  }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }

  .hero-gradient {
    background: radial-gradient(circle at top, #eff6ff 0%, #ffffff 52%, #ffffff 100%);
  }

  .hero-logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .hero-logo-row img {
    height: 68px;
    width: auto;
    object-fit: contain;
    background: #fff;
    border-radius: 14px;
    padding: 0.45rem 0.7rem;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
  }

  .accept-badge-wrap {
    margin-top: 1rem;
    display: flex;
    justify-content: center;
  }

  .accept-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.85rem 1.2rem;
    border-radius: 999px;
    background: linear-gradient(135deg, #eef2ff, #ecfeff);
    border: 1px solid #c7d2fe;
    color: #1f2937;
    font-weight: 800;
    box-shadow: 0 10px 25px rgba(29, 78, 216, 0.10);
  }

  .accept-badge .tag-pill {
    background: #111827;
    color: #fff;
    border-radius: 999px;
    padding: 0.32rem 0.65rem;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .hero-summary {
    max-width: 900px;
    margin: 1rem auto 0 auto;
    color: #374151;
    line-height: 1.7;
  }

  .custom-buttons {
    margin-top: 1.4rem;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .custom-buttons .button {
    border-radius: 999px;
    padding-left: 1rem;
    padding-right: 1rem;
  }

  .metric-card {
    border: 1px solid var(--border);
    border-radius: 18px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    padding: 1.2rem;
    height: 100%;
    box-shadow: var(--shadow-soft);
  }

  .metric-card h3 {
    margin-bottom: 0.35rem;
    font-size: 1.65rem;
    font-weight: 800;
    color: var(--primary);
  }

  .info-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #ffffff;
    padding: 1.25rem;
    height: 100%;
    box-shadow: var(--shadow-soft);
  }

  .section-figure {
    margin-top: 1rem;
    margin-bottom: 0.75rem;
    text-align: center;
  }

  .section-figure img {
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: white;
    display: block;
    margin: 0 auto;
    box-shadow: var(--shadow-soft);
  }

  .figure-caption {
    margin-top: 0.75rem;
    font-size: 0.98rem;
    color: #555;
    text-align: center;
    line-height: 1.6;
  }

  .publication-authors a {
    color: inherit;
    text-decoration: none;
  }

  .spacer-top {
    margin-top: 1rem;
  }

  .results-shell {
    margin-top: 1rem;
    padding: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    box-shadow: var(--shadow);
  }

  .results-topline {
    max-width: 940px;
    margin: 0 auto 1.25rem auto;
    padding: 1.2rem 1.35rem;
    border-left: 5px solid #22c55e;
    background: #f0fdf4;
    border-radius: 14px;
    color: #1f2937;
    font-size: 1.1rem;
    line-height: 1.8;
  }

  .results-tabs {
    display: flex;
    justify-content: center;
    gap: 0.65rem;
    flex-wrap: wrap;
    margin-bottom: 1.35rem;
  }

  .results-tab-btn {
    border: 1px solid #d1d5db;
    background: #fff;
    color: #1f2937;
    border-radius: 10px;
    padding: 0.7rem 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .results-tab-btn:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
  }

  .results-tab-btn.is-active {
    background: #1f2937;
    color: #fff;
    border-color: #1f2937;
  }

  .results-panel {
    display: none;
  }

  .results-panel.is-active {
    display: block;
  }

  .results-metric-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .results-stat {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1rem;
    text-align: center;
    box-shadow: var(--shadow-soft);
  }

  .results-stat .value {
    font-size: 2.3rem;
    font-weight: 800;
    line-height: 1.1;
    color: #111827;
  }

  .results-stat .label {
    margin-top: 0.45rem;
    font-size: 0.92rem;
    font-weight: 700;
    color: #111827;
  }

  .results-stat .sub {
    margin-top: 0.18rem;
    font-size: 0.92rem;
    color: var(--muted);
  }

  .fancy-table-card {
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    background: #fff;
    box-shadow: var(--shadow-soft);
  }

  .fancy-table-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 1rem 1.1rem;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-bottom: 1px solid var(--border);
  }

  .fancy-table-head h3 {
    margin: 0;
    font-size: 1.08rem;
    font-weight: 800;
  }

  .fancy-table-chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: #eef2ff;
    color: var(--primary-dark);
    padding: 0.35rem 0.7rem;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table.fancy-paper-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 760px;
    font-size: 0.96rem;
  }

  table.fancy-paper-table thead th {
    background: #f8fafc;
    color: #111827;
    font-weight: 800;
    padding: 0.95rem 0.9rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
  }

  table.fancy-paper-table tbody td {
    padding: 0.95rem 0.9rem;
    border-bottom: 1px solid #eef2f7;
    color: #1f2937;
    vertical-align: middle;
  }

  table.fancy-paper-table tbody tr:last-child td {
    border-bottom: none;
  }

  table.fancy-paper-table tbody tr:hover {
    background: #fafcff;
  }

  .method-cell {
    font-weight: 700;
    color: #111827;
  }

  .best {
    font-weight: 800;
    color: var(--primary);
  }

  .mini-note {
    margin-top: 0.7rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .figure-card {
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    box-shadow: var(--shadow);
  }

  .section-title-tight {
    margin-bottom: 0.75rem !important;
  }

  .compact-p {
    max-width: 860px;
    margin: 0 auto 1rem auto;
    text-align: center;
    color: var(--muted);
    line-height: 1.7;
  }

  .bibtex-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .copy-bibtex-btn {
    border: none;
    background: #111827;
    color: white;
    border-radius: 999px;
    padding: 0.65rem 1rem;
    cursor: pointer;
    font-weight: 600;
  }

  .copy-bibtex-btn:hover {
    background: #1f2937;
  }

  pre {
    border-radius: 12px;
    padding: 1rem;
    overflow-x: auto;
    background: #f5f5f5;
  }

  @media (max-width: 1024px) {
    .results-metric-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 768px) {
    .hero-logo-row img {
      height: 56px;
    }

    .results-shell {
      padding: 1rem;
    }

    .results-topline {
      font-size: 1rem;
      padding: 1rem;
    }

    .results-metric-grid {
      grid-template-columns: 1fr;
    }

    .results-stat .value {
      font-size: 2rem;
    }
  }
</style>
